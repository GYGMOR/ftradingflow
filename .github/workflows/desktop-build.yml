name: Desktop Release Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest] # Add macos-latest or ubuntu-latest here if needed

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Frontend Dependencies
        run: |
          cd tradeflow-web
          npm install

      - name: Build Core UI
        run: |
          cd tradeflow-web
          npm run build

      - name: Build Desktop App (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # tauri-action replaces this with the app version
          releaseName: "TradeFlow Desktop v__VERSION__"
          releaseBody: "Automated Build from GitHub Actions."
          releaseDraft: true
          prerelease: false
          projectPath: tradeflow-web

      - name: Upload Artifacts (for easy download)
        uses: actions/upload-artifact@v4
        with:
          name: TradeFlow-Installers
          path: |
            tradeflow-web/src-tauri/target/release/bundle/nsis/*.exe
            tradeflow-web/src-tauri/target/release/bundle/msi/*.msi
